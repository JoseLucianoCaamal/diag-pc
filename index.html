<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SistemDiag | Inventario PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Estilo Ficha Técnica */
        .ficha-tecnica {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .ficha-header { 
            display: flex; align-items: center; gap: 15px; 
            border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 20px;
        }
        .item-pro {
            display: flex; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px ridge rgba(255,255,255,0.05);
        }
        .label-pro { color: #94a3b8; font-size: 0.9rem; }
        .val-pro { font-weight: bold; color: var(--accent); }
        
        .badge-age {
            padding: 4px 12px; border-radius: 20px; font-size: 0.75rem;
            background: #334155; color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="user-name">Cargando...</h1>
    </div>

    <div class="ficha-tecnica">
        <div class="ficha-header">
            <i class="fas fa-clipboard-list fa-2x" style="color: var(--accent);"></i>
            <div>
                <h2 style="margin:0">Ficha Técnica de Auditoría</h2>
                <span style="font-size: 0.8rem; color: #666;">DATOS EXTRAÍDOS DEL HARDWARE</span>
            </div>
        </div>

        <div class="item-pro">
            <span class="label-pro"><i class="fas fa-microchip"></i> Marca de RAM:</span>
            <span id="ram-brand" class="val-pro">---</span>
        </div>

        <div class="item-pro">
            <span class="label-pro"><i class="fas fa-fingerprint"></i> S/N Disco:</span>
            <span id="disk-serial" class="val-pro">---</span>
        </div>

        <div class="item-pro">
            <span class="label-pro"><i class="fas fa-calendar-alt"></i> Año de Fabricación:</span>
            <span id="bios-date" class="val-pro">---</span>
        </div>

        <div class="item-pro">
            <span class="label-pro"><i class="fas fa-shield-alt"></i> Estado de Garantía:</span>
            <span id="age-status" class="badge-age">Estimando...</span>
        </div>
    </div>
</div>

<script>
    async function update() {
        try {
            const res = await fetch("https://sistem-diag-default-rtdb.firebaseio.com/monitoreo.json");
            const d = await res.json();
            
            document.getElementById('user-name').innerText = "EQUIPO: " + d.info.user;
            
            // Llenar Ficha Técnica
            document.getElementById('ram-brand').innerText = d.info.ram_brand;
            document.getElementById('disk-serial').innerText = d.info.disk_serial;
            document.getElementById('bios-date').innerText = d.info.bios;
            
            // Lógica de Garantía (Algoritmo de edad)
            const ageText = d.info.age;
            const badge = document.getElementById('age-status');
            badge.innerText = ageText;
            
            const numAge = parseInt(ageText);
            if(numAge <= 2) {
                badge.style.background = "#059669"; // Verde (Vigente)
                badge.innerText += " - PROBABLE GARANTÍA";
            } else {
                badge.style.background = "#b91c1c"; // Rojo (Expirada)
                badge.innerText += " - FUERA DE GARANTÍA";
            }

        } catch(e) {}
    }
    setInterval(update, 2000);
</script>
</body>
</html>
