<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SistemDiag PRO | Dashboard de Salud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --good: #4ade80;
            --warn: #fbbf24;
            --bad: #f87171;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        /* Encabezado Principal */
        .header {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid var(--accent);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .user-info h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 900;
        }

        .top-process-box {
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .process-tag {
            background: #000;
            padding: 2px 8px;
            border-radius: 5px;
            color: var(--warn);
            font-weight: bold;
        }

        /* Botón de Acción */
        .btn-clean {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .btn-clean:hover {
            background: var(--good);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 222, 128, 0.4);
        }

        .btn-clean:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        /* Grid de Tarjetas */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            transition: transform 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .val-main {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
            margin-bottom: 5px;
        }

        /* Barras de Progreso */
        .progress-bar {
            background: #334155;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 1s ease-in-out, background-color 0.5s;
        }

        .details {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .ping-badge {
            font-size: 0.75rem;
            background: rgba(0,0,0,0.2);
            padding: 5px 10px;
            border-radius: 20px;
            margin-top: 10px;
            display: inline-block;
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; gap: 20px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-info">
            <span style="color: var(--accent); font-weight: bold; font-size: 0.75rem;">SISTEMA DETECTADO</span>
            <h1 id="user-name">CONECTANDO...</h1>
            <div class="top-process-box">
                <i class="fas fa-tasks"></i> Programa más pesado: <span id="top-proc" class="process-tag">...</span>
            </div>
        </div>
        
        <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 12px;">
            <button class="btn-clean" id="cleanBtn" onclick="solicitarLimpieza()">
                <i class="fas fa-broom"></i> LIMPIAR TEMPORALES
            </button>
            <div id="uptime-text" style="font-size: 0.85rem; color: var(--text-dim);">
                <i class="fas fa-clock"></i> 00:00:00
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <span class="card-title"><i class="fas fa-brain"></i> Procesador</span>
            <span id="cpu-val" class="val-main" style="color: var(--accent);">0%</span>
            <div class="progress-bar"><div id="cpu-fill" class="progress-fill" style="background: var(--accent);"></div></div>
            <span id="cpu-status" class="details">Analizando carga...</span>
        </div>

        <div class="card">
            <span class="card-title"><i class="fas fa-microchip"></i> Memoria RAM</span>
            <span id="ram-val" class="val-main" style="color: var(--warn);">0%</span>
            <div class="progress-bar"><div id="ram-fill" class="progress-fill" style="background: var(--warn);"></div></div>
            <span id="ram-status" class="details">Uso de memoria interna</span>
        </div>

        <div class="card">
            <span class="card-title"><i class="fas fa-hdd"></i> Almacenamiento</span>
            <span id="disk-val" class="val-main" style="color: #fff;">0%</span>
            <div class="progress-bar"><div id="disk-fill" class="progress-fill" style="background: #fff;"></div></div>
            <span id="disk-details" class="details">Calculando espacio...</span>
        </div>

        <div class="card">
            <span class="card-title"><i class="fas fa-bolt" id="bat-icon"></i> Energía Vital</span>
            <span id="bat-val" class="val-main" style="color: var(--good);">0%</span>
            <div class="progress-bar"><div id="bat-fill" class="progress-fill" style="background: var(--good);"></div></div>
            <span id="bat-status" class="details">Verificando...</span>
            <div class="ping-badge"><i class="fas fa-wifi"></i> Internet: <span id="ping-val">0 ms</span></div>
        </div>
    </div>
</div>

<script>
    const dbUrl = "https://sistem-diag-default-rtdb.firebaseio.com/monitoreo.json";

    // Función para pedirle al script de Python que limpie la PC
    async function solicitarLimpieza() {
        const btn = document.getElementById('cleanBtn');
        const originalContent = btn.innerHTML;
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> ENVIANDO ORDEN...';

        try {
            // Enviamos el comando "limpiar" a la base de datos
            await fetch(dbUrl, {
                method: 'PATCH',
                body: JSON.stringify({ "comando": "limpiar" })
            });

            btn.innerHTML = '<i class="fas fa-broom"></i> LIMPIANDO PC...';
            
            // Esperamos 5 segundos para que el script actúe y mostramos éxito
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-check-circle"></i> ¡PC OPTIMIZADA!';
                btn.style.background = "var(--good)";
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    btn.style.background = "var(--accent)";
                }, 3000);
            }, 5000);

        } catch (error) {
            alert("No se pudo conectar con el servidor.");
            btn.disabled = false;
            btn.innerHTML = originalContent;
        }
    }

    async function update() {
        try {
            const response = await fetch(dbUrl);
            const data = await response.json();
            if (!data) return;

            // Actualizar Textos e Info superior
            document.getElementById('user-name').innerText = data.info.user || "EQUIPO";
            document.getElementById('uptime-text').innerHTML = `<i class="fas fa-clock"></i> En línea: ${data.info.uptime}`;
            document.getElementById('top-proc').innerText = data.info.top_process || "Ninguno";
            document.getElementById('ping-val').innerText = data.info.ping || "---";

            // CPU
            const cpu = data.stats.cpu;
            document.getElementById('cpu-val').innerText = cpu + "%";
            document.getElementById('cpu-fill').style.width = cpu + "%";
            document.getElementById('cpu-status').innerText = cpu > 80 ? "¡PC muy cargada!" : "Cerebro relajado";

            // RAM
            const ram = data.stats.ram;
            document.getElementById('ram-val').innerText = ram + "%";
            document.getElementById('ram-fill').style.width = ram + "%";
            document.getElementById('ram-status').innerText = ram > 85 ? "Poca memoria libre" : "Memoria estable";

            // DISCO (Numeritos de GB)
            const disk = data.stats.disk;
            document.getElementById('disk-val').innerText = disk + "%";
            document.getElementById('disk-fill').style.width = disk + "%";
            document.getElementById('disk-details').innerHTML = 
                `Disponible: <b>${data.info.disk_free}</b> de ${data.info.disk_total}`;

            // BATERÍA
            const bat = data.stats.bat;
            document.getElementById('bat-val').innerText = bat + "%";
            document.getElementById('bat-fill').style.width = bat + "%";
            const charging = data.stats.charging;
            document.getElementById('bat-status').innerText = charging ? "Cargando batería" : "Usando batería interna";
            document.getElementById('bat-icon').style.color = charging ? "var(--good)" : "white";

        } catch (e) {
            console.log("Esperando conexión con el script...");
        }
    }

    // Actualización cada segundo
    setInterval(update, 1000);
    update();
</script>

</body>
</html>
