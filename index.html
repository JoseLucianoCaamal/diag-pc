<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SistemDiag Ultimate | Auditoría & Salud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --good: #4ade80;
            --warn: #fbbf24;
            --bad: #f87171;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 1000px; }

        /* Encabezado */
        .header {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid var(--accent);
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }

        .user-info h1 { margin: 0; font-size: 1.6rem; }
        .top-proc-tag { color: var(--warn); font-size: 0.85rem; font-weight: bold; background: #000; padding: 2px 8px; border-radius: 5px; }

        .btn-clean {
            background: var(--accent); color: #0f172a; border: none; padding: 12px 20px;
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-clean:hover { background: var(--good); transform: scale(1.05); }

        /* Grid de Salud */
        .grid-salud {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .card-title { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 10px; }
        .val-main { font-size: 2.2rem; font-weight: 800; display: block; }
        
        .progress-bar { background: #334155; height: 8px; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: 1s ease-in-out; }

        /* Ficha Técnica y Seguridad */
        .ficha {
            background: #111827;
            padding: 30px;
            border-radius: 25px;
            border: 2px dashed var(--accent);
        }

        .ficha-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .ficha-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .label { color: var(--text-dim); font-size: 0.9rem; }
        .value { color: var(--accent); font-weight: bold; }

        .usb-badge { padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .seguro { background: #059669; color: white; }
        .peligro { background: var(--bad); color: white; animation: flash 1s infinite; }

        @keyframes flash { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-info">
            <h1 id="user-name">CONECTANDO...</h1>
            <div style="margin-top:8px">
                <span class="label">Proceso más pesado:</span> <span id="top-proc" class="top-proc-tag">...</span>
            </div>
        </div>
        <button class="btn-clean" onclick="ejecutarLimpieza()">
            <i class="fas fa-broom"></i> OPTIMIZAR SISTEMA
        </button>
    </div>

    <div class="grid-salud">
        <div class="card">
            <span class="card-title">Cerebro (CPU)</span>
            <span id="cpu-val" class="val-main">0%</span>
            <div class="progress-bar"><div id="cpu-fill" class="progress-fill" style="background: var(--accent);"></div></div>
        </div>
        <div class="card">
            <span class="card-title">Memoria (RAM)</span>
            <span id="ram-val" class="val-main">0%</span>
            <div class="progress-bar"><div id="ram-fill" class="progress-fill" style="background: var(--warn);"></div></div>
        </div>
        <div class="card">
            <span class="card-title">Disco (Uso)</span>
            <span id="disk-val" class="val-main">0%</span>
            <div class="progress-bar"><div id="disk-fill" class="progress-fill" style="background: white;"></div></div>
        </div>
        <div class="card">
            <span class="card-title">Energía</span>
            <span id="bat-val" class="val-main">0%</span>
            <div class="progress-bar"><div id="bat-fill" class="progress-fill" style="background: var(--good);"></div></div>
        </div>
    </div>

    <div class="ficha">
        <div class="ficha-header">
            <h2 style="margin:0"><i class="fas fa-microchip"></i> Auditoría de Hardware</h2>
            <span id="usb-status" class="usb-badge seguro">SISTEMA SEGURO</span>
        </div>
        
        <div class="ficha-row"><span class="label">Marca de Memoria:</span> <span id="f-ram" class="value">---</span></div>
        <div class="ficha-row"><span class="label">Número de Serie Disco:</span> <span id="f-disk" class="value">---</span></div>
        <div class="ficha-row"><span class="label">Fabricación BIOS:</span> <span id="f-bios" class="value">---</span></div>
        <div class="ficha-row"><span class="label">Capacidad Real:</span> <span id="f-space" class="value">---</span></div>
        <div class="ficha-row"><span class="label">Edad Estimada:</span> <span id="f-age" style="padding:2px 10px; border-radius:10px; font-weight:bold;">---</span></div>
    </div>
</div>

<script>
    const db = "https://sistem-diag-default-rtdb.firebaseio.com/monitoreo.json";

    async function ejecutarLimpieza() {
        await fetch(db, { method: 'PATCH', body: JSON.stringify({ "comando": "limpiar" }) });
        alert("Orden de limpieza enviada a la PC.");
    }

    async function update() {
        try {
            const res = await fetch(db);
            const d = await res.json();
            if(!d) return;

            // Datos Header
            document.getElementById('user-name').innerText = "EQUIPO: " + d.info.user;
            document.getElementById('top-proc').innerText = d.info.top_proc || "Sistema";

            // Gráficas
            document.getElementById('cpu-val').innerText = d.stats.cpu + "%";
            document.getElementById('cpu-fill').style.width = d.stats.cpu + "%";
            document.getElementById('ram-val').innerText = d.stats.ram + "%";
            document.getElementById('ram-fill').style.width = d.stats.ram + "%";
            document.getElementById('disk-val').innerText = d.stats.disk + "%";
            document.getElementById('disk-fill').style.width = d.stats.disk + "%";
            document.getElementById('bat-val').innerText = d.stats.bat + "%";
            document.getElementById('bat-fill').style.width = d.stats.bat + "%";

            // Ficha Técnica (Corrigiendo Undefined)
            document.getElementById('f-ram').innerText = d.info.ram_brand || "Genérica";
            document.getElementById('f-disk').innerText = d.info.disk_serial || "SATA_01";
            document.getElementById('f-bios').innerText = d.info.bios || "N/D";
            document.getElementById('f-space').innerText = `${d.info.disk_free} libres de ${d.info.disk_total}`;
            
            // Edad y Garantía
            const ageBadge = document.getElementById('f-age');
            ageBadge.innerText = d.info.age || "---";
            ageBadge.style.background = parseInt(d.info.age) <= 2 ? "#059669" : "#b91c1c";

            // Seguridad USB
            const usb = document.getElementById('usb-status');
            usb.innerText = d.info.usb_status || "Seguro";
            usb.className = d.info.usb_status === "Seguro" ? "usb-badge seguro" : "usb-badge peligro";

        } catch(e) { console.log("Sincronizando..."); }
    }

    setInterval(update, 1000);
</script>

</body>
</html>
