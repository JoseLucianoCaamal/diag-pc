<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SistemDiag Ultimate Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --accent: #38bdf8; --good: #4ade80; --warn: #fbbf24; --bad: #f87171; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        .header { background: var(--card); padding: 25px; border-radius: 20px; border-left: 8px solid var(--accent); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-clean { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar { background: #334155; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: 1s; width: 0%; }

        .ficha-forense { background: #000; padding: 25px; border-radius: 20px; border: 2px dashed var(--accent); }
        .ficha-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }
        .label { color: #64748b; } .value { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 id="user-name" style="margin:0">DETECTANDO...</h1>
            <span style="font-size:0.85rem; color:var(--warn)">PROCESO TOP: <b id="top-proc">---</b></span>
        </div>
        <div style="text-align:right">
            <div id="net-val" style="font-size:0.8rem; margin-bottom:10px"><i class="fas fa-network-wired"></i> Red: 0 Mbps</div>
            <button class="btn-clean" onclick="limpiar()"><i class="fas fa-broom"></i> OPTIMIZAR PC</button>
        </div>
    </div>

    <div class="grid-stats">
        <div class="card"><span>CPU</span><div id="cpu-val" style="font-size:2rem; font-weight:bold">0%</div><div class="progress-bar"><div id="cpu-fill" class="progress-fill" style="background:var(--accent)"></div></div></div>
        <div class="card"><span>RAM</span><div id="ram-val" style="font-size:2rem; font-weight:bold">0%</div><div class="progress-bar"><div id="ram-fill" class="progress-fill" style="background:var(--warn)"></div></div></div>
        <div class="card"><span>DISCO</span><div id="disk-val" style="font-size:2rem; font-weight:bold">0%</div><div class="progress-bar"><div id="disk-fill" class="progress-fill" style="background:#fff"></div></div></div>
        <div class="card"><span>BATERÍA</span><div id="bat-val" style="font-size:2rem; font-weight:bold">0%</div><div class="progress-bar"><div id="bat-fill" class="progress-fill" style="background:var(--good)"></div></div></div>
    </div>

    <div class="ficha-forense">
        <h3 style="margin-top:0; color:var(--accent)"><i class="fas fa-search-plus"></i> INFORME DE AUDITORÍA FORENSE</h3>
        <div class="ficha-row"><span class="label">Año de Fabricación (BIOS):</span> <span class="value" id="f-bios">---</span></div>
        <div class="ficha-row"><span class="label">Edad del Hardware:</span> <span id="f-age" style="padding:2px 10px; border-radius:10px; color:#fff">---</span></div>
        <div class="ficha-row"><span class="label">Almacenamiento Total:</span> <span class="value" id="f-space">---</span></div>
        <div class="ficha-row"><span class="label">Integridad Física (Errores):</span> <span id="f-errors" class="value">0 detectados</span></div>
        <div class="ficha-row"><span class="label">Tiempo de Actividad:</span> <span class="value" id="f-uptime">00:00:00</span></div>
    </div>
</div>

<script>
    async function limpiar() {
        await fetch("https://sistem-diag-default-rtdb.firebaseio.com/monitoreo.json", {method:'PATCH', body: JSON.stringify({"comando":"limpiar"})});
        alert("Comando de optimización enviado.");
    }

    async function update() {
        try {
            const res = await fetch("https://sistem-diag-default-rtdb.firebaseio.com/monitoreo.json");
            const d = await res.json();
            
            document.getElementById('user-name').innerText = "EQUIPO: " + d.info.user;
            document.getElementById('top-proc').innerText = d.info.top_proc || "Sistema";
            document.getElementById('net-val').innerHTML = `<i class="fas fa-network-wired"></i> Red: ${d.info.net_speed}`;

            // Actualizar Barras
            const metrics = ['cpu', 'ram', 'disk', 'bat'];
            metrics.forEach(m => {
                document.getElementById(`${m}-val`).innerText = d.stats[m] + "%";
                document.getElementById(`${m}-fill`).style.width = d.stats[m] + "%";
            });

            // Ficha Forense
            document.getElementById('f-bios').innerText = d.info.bios;
            document.getElementById('f-space').innerText = `${d.info.disk_free} libres de ${d.info.disk_total}`;
            document.getElementById('f-uptime').innerText = d.info.uptime;
            document.getElementById('f-errors').innerText = d.info.disk_errors + " errores físicos";
            document.getElementById('f-errors').style.color = d.info.disk_errors > 0 ? "var(--bad)" : "var(--good)";
            
            const ageBadge = document.getElementById('f-age');
            ageBadge.innerText = d.info.age;
            ageBadge.style.background = parseInt(d.info.age) <= 2 ? "#059669" : "#b91c1c";

        } catch(e) {}
    }
    setInterval(update, 1000);
</script>
</body>
</html>
