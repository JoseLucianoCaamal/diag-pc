<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SistemDiag | Salud del Equipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --good: #4ade80; --warn: #fbbf24; --bad: #f87171; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 20px; }
        
        .container { max-width: 900px; margin: auto; }
        .header { background: var(--card); padding: 30px; border-radius: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; position: relative; }
        
        .card-title { font-size: 0.9rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 15px; }
        .val-main { font-size: 2.2rem; font-weight: 800; display: block; margin-bottom: 5px; }
        
        /* Barras de progreso */
        .progress-bar { background: #334155; height: 10px; border-radius: 5px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; transition: 1s ease-in-out; width: 0%; }
        
        .details { font-size: 0.8rem; color: #94a3b8; }
        .user-name { font-size: 1.8rem; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <span style="color: var(--accent); font-weight: bold;">DISPOSITIVO DETECTADO:</span>
            <div id="user-name" class="user-name">Cargando...</div>
        </div>
        <div style="text-align: right;">
            <i class="fas fa-clock"></i> <span id="uptime">00:00:00</span>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <span class="card-title"><i class="fas fa-brain"></i> Uso del Cerebro</span>
            <span id="cpu-val" class="val-main">0%</span>
            <div class="progress-bar"><div id="cpu-fill" class="progress-fill" style="background: var(--accent);"></div></div>
            <span id="cpu-status" class="details">Estado Nominal</span>
        </div>

        <div class="card">
            <span class="card-title"><i class="fas fa-microchip"></i> Memoria de Trabajo</span>
            <span id="ram-val" class="val-main">0%</span>
            <div class="progress-bar"><div id="ram-fill" class="progress-fill" style="background: var(--warn);"></div></div>
            <span id="ram-status" class="details">Estable</span>
        </div>

        <div class="card">
            <span class="card-title"><i class="fas fa-hdd"></i> Almacenamiento</span>
            <span id="disk-val" class="val-main">0%</span>
            <div class="progress-bar"><div id="disk-fill" class="progress-fill" style="background: #fff;"></div></div>
            <span id="disk-details" class="details">Cargando datos...</span>
        </div>

        <div class="card">
            <span class="card-title"><i class="fas fa-bolt" id="charge-icon"></i> Energía Vital</span>
            <span id="bat-val" class="val-main">0%</span>
            <div class="progress-bar"><div id="bat-fill" class="progress-fill" style="background: var(--good);"></div></div>
            <span id="bat-status" class="details">Verificando...</span>
        </div>
    </div>
</div>

<script>
    async function update() {
        try {
            const res = await fetch("https://sistem-diag-default-rtdb.firebaseio.com/monitoreo.json");
            const d = await res.json();
            
            // Header
            document.getElementById('user-name').innerText = d.info.user;
            document.getElementById('uptime').innerText = d.info.uptime;

            // CPU
            document.getElementById('cpu-val').innerText = d.stats.cpu + "%";
            document.getElementById('cpu-fill').style.width = d.stats.cpu + "%";
            document.getElementById('cpu-status').innerText = d.stats.cpu > 70 ? "¡Muy ocupado!" : "Trabajando bien";

            // RAM
            document.getElementById('ram-val').innerText = d.stats.ram + "%";
            document.getElementById('ram-fill').style.width = d.stats.ram + "%";

            // DISCO (Tus "numeritos" solicitados)
            document.getElementById('disk-val').innerText = d.stats.disk + "%";
            document.getElementById('disk-fill').style.width = d.stats.disk + "%";
            document.getElementById('disk-details').innerHTML = 
                `Libre: <b>${d.info.disk_free}</b> de ${d.info.disk_total}`;

            // BATERÍA
            document.getElementById('bat-val').innerText = d.stats.bat + "%";
            document.getElementById('bat-fill').style.width = d.stats.bat + "%";
            document.getElementById('bat-status').innerText = d.stats.charging ? "Conectado a corriente" : "Usando batería";
            document.getElementById('charge-icon').style.color = d.stats.charging ? "var(--good)" : "#fff";

        } catch(e) {}
    }
    setInterval(update, 1000);
</script>
</body>
</html>
