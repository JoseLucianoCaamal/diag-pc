<div class="main-grid">
    <div class="card">
        <div class="label">CPU LOAD</div>
        <div id="cpu-p" class="val" style="color:var(--primary)">0%</div>
    </div>
    <div class="card">
        <div class="label">RAM USAGE</div>
        <div id="ram-p" class="val" style="color:var(--secondary)">0%</div>
    </div>
    <div class="card">
        <div class="label">DISK USED</div>
        <div id="disk-p" class="val" style="color:#fff">0%</div>
    </div>
    <div class="card">
        <div class="label">BATTERY HEALTH</div>
        <div id="bat-h" class="val" style="color:var(--success)">--%</div>
    </div>
</div>

<script>
    // En tu función update(), asegúrate de mapear bien los nuevos campos:
    async function update() {
        try {
            const res = await fetch("https://sistem-diag-default-rtdb.firebaseio.com/monitoreo.json");
            const d = await res.json();
            
            // Actualizar tarjetas
            document.getElementById('cpu-p').innerText = d.stats.cpu + "%";
            document.getElementById('ram-p').innerText = d.stats.ram + "%";
            document.getElementById('disk-p').innerText = d.stats.disk + "%"; // Porcentaje de uso
            document.getElementById('bat-h').innerText = d.stats.bat_health + "%"; // Salud de vida
            
            // Actualizar cintilla superior
            document.getElementById('cpu_mod').innerText = d.info.cpu_mod;
            document.getElementById('ram_t').innerText = d.info.ram_t;
            document.getElementById('disk_t').innerText = d.info.disk_t; // Capacidad total
            
            // ... resto de tu lógica de logs y uptime ...
        } catch(e) { console.log("Error de conexión"); }
    }
</script>
